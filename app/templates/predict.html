{% extends 'base.html' %}

{% block title %}Smart Lender - Apply for a Loan{% endblock %}

{% block content %}
<div class="container form-container">
    <div class="form-header">
        <h2>Loan Application Form</h2>
        <p>Please fill out all the details accurately to check your loan eligibility.</p>
    </div>

    <form action="/predict" method="POST" id="loanForm" class="loan-form">
        
        <div class="form-row">
            <div class="form-group">
                <label for="Gender">Gender <span class="required">*</span></label>
                <select id="Gender" name="Gender" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
                <span class="error-message" id="error-Gender"></span>
            </div>
            
            <div class="form-group">
                <label for="Married">Marital Status <span class="required">*</span></label>
                <select id="Married" name="Married" required>
                    <option value="" disabled selected>Select Status</option>
                    <option value="Yes">Married</option>
                    <option value="No">Single</option>
                </select>
                <span class="error-message" id="error-Married"></span>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="Dependents">Dependents <span class="required">*</span></label>
                <select id="Dependents" name="Dependents" required>
                    <option value="" disabled selected>Select Number</option>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3+">3+</option>
                </select>
                <span class="error-message" id="error-Dependents"></span>
            </div>

            <div class="form-group">
                <label for="Education">Education Level <span class="required">*</span></label>
                <select id="Education" name="Education" required>
                    <option value="" disabled selected>Select Education</option>
                    <option value="Graduate">Graduate</option>
                    <option value="Not Graduate">Not Graduate</option>
                </select>
                <span class="error-message" id="error-Education"></span>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="Self_Employed">Self Employed <span class="required">*</span></label>
                <select id="Self_Employed" name="Self_Employed" required>
                    <option value="" disabled selected>Select Employment</option>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
                <span class="error-message" id="error-Self_Employed"></span>
            </div>

            <div class="form-group">
                <label for="ApplicantIncome">Applicant Income (₹) <span class="required">*</span></label>
                <input type="number" id="ApplicantIncome" name="ApplicantIncome" min="0" placeholder="e.g., 5000" required>
                <span class="error-message" id="error-ApplicantIncome"></span>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="CoapplicantIncome">Co-applicant Income (₹) <span class="required">*</span></label>
                <input type="number" id="CoapplicantIncome" name="CoapplicantIncome" min="0" placeholder="e.g., 0" required>
                <span class="error-message" id="error-CoapplicantIncome"></span>
            </div>

            <div class="form-group">
                <label for="LoanAmount">Requested Loan Amount (in Thousands, ₹) <span class="required">*</span></label>
                <input type="number" id="LoanAmount" name="LoanAmount" min="1" placeholder="e.g., 150" required>
                <span class="error-message" id="error-LoanAmount"></span>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="Loan_Amount_Term">Loan Term (Days) <span class="required">*</span></label>
                <input type="number" id="Loan_Amount_Term" name="Loan_Amount_Term" min="12" value="360" required>
                <span class="error-message" id="error-Loan_Amount_Term"></span>
            </div>

            <div class="form-group">
                <label for="Credit_History">Credit History <span class="required">*</span></label>
                <select id="Credit_History" name="Credit_History" required>
                    <option value="" disabled selected>Select History</option>
                    <option value="1.0">Good (Meets Guidelines)</option>
                    <option value="0.0">Poor (Does Not Meet Guidelines)</option>
                </select>
                <span class="error-message" id="error-Credit_History"></span>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group full-width">
                <label for="Property_Area">Property Area <span class="required">*</span></label>
                <select id="Property_Area" name="Property_Area" required>
                    <option value="" disabled selected>Select Area</option>
                    <option value="Urban">Urban</option>
                    <option value="Semiurban">Semiurban</option>
                    <option value="Rural">Rural</option>
                </select>
                <span class="error-message" id="error-Property_Area"></span>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-submit">Predict Loan Eligibility</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/validation.js') }}"></script>
{% endblock %}
